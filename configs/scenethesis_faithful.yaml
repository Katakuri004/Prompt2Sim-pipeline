seed: 7
paper_faithful:
  enabled: true
  allow_substitutes: false
  require_cuda: true
  min_free_disk_gb: 10
scene:
  bounds: [10.0, 8.0, 3.5]
  units: meters
  max_objects: 16
openai:
  model: gpt-5.5
  vision_model: gpt-5.5
  image_model: gpt-image-1
  max_retries: 5
image_guidance:
  enabled: true
  image_size: 1536x1024
  image_quality: high
  max_validation_attempts: 4
  correction_mode: edit_high_fidelity
segmentation:
  provider: grounded_sam
  device: cuda
  grounding_dino_config: models/repos/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py
  grounding_dino_checkpoint: models/checkpoints/groundingdino_swint_ogc.pth
  sam_model_type: vit_h
  sam_checkpoint: models/checkpoints/sam_vit_h_4b8939.pth
  box_threshold: 0.30
  text_threshold: 0.25
  min_expected_box_iou: 0.10
  min_expected_box_coverage: 0.20
depth:
  provider: depth_pro
  device: cuda
  repo_dir: models/repos/ml-depth-pro
  checkpoint_dir: models/repos/ml-depth-pro/checkpoints
pose_extraction:
  max_points_per_object: 5000
  min_mask_pixels: 128
depth_pose_refinement:
  enabled: true
  apply_scale: true
  apply_yaw: true
  min_extent_m: 0.025
  min_yaw_anisotropy: 1.25
  max_scale_delta_fraction: 0.12
  min_scale: 0.20
  max_scale: 1.60
  max_scale_estimate_ratio: 1.65
  max_yaw_delta_deg: 18
asset_retrieval:
  provider: grs_multiview_vlm
  device: cuda
  index_path: assets/indexes/warehouse_clip_index.npz
  min_score: 0.18
  text_weight: 0.20
  metadata_weight: 0.35
  top_k: 3
  min_match_confidence: 0.72
  min_score_margin: 0.05
  max_shape_error: 0.70
  guidance_repair_rounds: 2
  profile_dir: assets/profiles/warehouse
  view_dir: assets/asset_views/warehouse
  profile_resolution: 512
correspondence:
  enabled: true
  provider: roma
  device: cuda
  model: roma_outdoor
  weights_path: models/checkpoints/roma_outdoor.pth
  dinov2_weights_path: models/checkpoints/dinov2_vitl14_pretrain.pth
  confidence_threshold: 0.6
  max_correspondences: 100
  min_correspondences: 12
  max_yaw_delta_deg: 12
joint_pose_optimizer:
  enabled: true
  provider: depth_roma_joint
  max_iters: 8
  learning_rate: 0.45
  max_translation_step_m: 0.04
  max_scale_step_fraction: 0.05
  max_yaw_step_deg: 5.0
  min_yaw_anisotropy: 1.25
  min_correspondences: 12
  min_mean_confidence: 0.60
  depth_position_weight: 0.35
  depth_scale_weight: 0.85
  depth_yaw_weight: 0.45
  roma_yaw_weight: 0.65
  lock_structural_supports: true
physics:
  provider: sdf_pytorch3d
  device: cuda
  surface_samples: 400
  optimizer: sgd
  max_iters: 120
  learning_rate: 0.03
  stall_patience: 12
  min_iters_before_stall: 12
repair:
  rounds: 2
render:
  resolution: [1200, 900]
  camera: three_quarter
  blender_path_env: BLENDER_PATH
  environment:
    floor_material:
      diffuse: assets/materials/polyhaven/concrete_floor_worn_001/concrete_floor_worn_001_diff_1k.jpg
      normal: assets/materials/polyhaven/concrete_floor_worn_001/concrete_floor_worn_001_nor_gl_1k.jpg
      roughness: assets/materials/polyhaven/concrete_floor_worn_001/concrete_floor_worn_001_rough_1k.jpg
    wall_material:
      diffuse: assets/materials/polyhaven/factory_wall/factory_wall_diff_1k.jpg
      normal: assets/materials/polyhaven/factory_wall/factory_wall_nor_gl_1k.jpg
      roughness: assets/materials/polyhaven/factory_wall/factory_wall_rough_1k.jpg
paths:
  asset_registry: configs/warehouse_asset_registry.yaml
  planner_prompt: configs/prompts/planner_system.txt
  judge_prompt: configs/prompts/judge_system.txt
  asset_profile_prompt: configs/prompts/asset_profile_system.txt
  asset_match_prompt: configs/prompts/asset_match_system.txt
  guidance_validation_prompt: configs/prompts/guidance_validation_system.txt
  checkpoints_dir: models/checkpoints
  repos_dir: models/repos
